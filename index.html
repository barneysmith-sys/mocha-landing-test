<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mocha — Interview prep that actually gets you hired.</title>
<meta name="description" content="Free AI behavioral interview coaching at McKinsey, Goldman, and Google standard. One question a day. Real feedback. Used at 14+ universities.">
<meta property="og:title" content="Mocha — Land your dream internship">
<meta property="og:description" content="Firm-grade scoring. STAR breakdown. A stronger version of your answer.">
<meta property="og:url" content="https://usemocha.app">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="theme-color" content="#0f1a14">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">

<style>
/* ═══════════════════════════════════════════
   MOCHA — Design System
   ═══════════════════════════════════════════ */
:root {
  --esp:  #0f1a14;
  --esp2: #070f0a;
  --med:  #0a5c44;
  --lt:   #0d7a5c;
  --ln:   #f5ede0;
  --ln2:  #eddece;
  --cr:   #ffffff;
  --oat:  #7a8f85;
  --sil:  #e0ebe6;
  --sil2: #eef5f2;
  --surf: #fafcfb;
  --r: 8px; --rlg: 12px; --rxl: 16px; --r2xl: 20px; --rpill: 99px;
  --sh-sm: 0 1px 0 rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.05);
  --sh-md: 0 1px 0 rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.07);
  --sh-lg: 0 1px 0 rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.09);
  --sh-xl: 0 2px 0 rgba(0,0,0,.08), 0 16px 48px rgba(0,0,0,.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{font-family:"DM Sans",system-ui,sans-serif;background:var(--cr);color:var(--esp);overflow-x:hidden;font-size:15px;line-height:1.5}

/* ══ HERO ══ */
.hero{position:relative;width:100%;display:block;line-height:0}
.hero img{width:100%;height:auto;display:block}
.hero-overlay{position:absolute;inset:0;pointer-events:none}
.hero-overlay button{position:absolute;background:transparent;border:none;cursor:pointer;pointer-events:all;padding:0;transition:background 0.15s}
.hero-overlay button:hover{background:rgba(255,255,255,0.08);border-radius:6px}
/* NAV buttons — calibrated to 1711×919 px image */
.ob-logo     {left:1.75%;top:0;    width:11.1%;height:7.07%}
.ob-product  {left:27.9%;top:0;    width:4.2%; height:7.07%}
.ob-pricing  {left:32.9%;top:0;    width:3.9%; height:7.07%}
.ob-unis     {left:37.2%;top:0;    width:8.6%; height:7.07%}
.ob-resources{left:46.3%;top:0;    width:6.3%; height:7.07%}
.ob-login    {left:91.9%;top:0;    width:5.4%; height:7.07%;border-radius:6px}
.ob-navstart {left:97.6%;top:0;    width:2.4%; height:7.07%;border-radius:8px}
/* HERO CTAs */
.ob-start    {left:4.4%; top:58.5%;width:9.1%; height:6.1%;border-radius:99px}
.ob-demo     {left:14.6%;top:58.5%;width:8.6%; height:6.1%;border-radius:99px}
/* Product panel */
.ob-try      {left:88.3%;top:90.4%;width:10.2%;height:4.8%;border-radius:8px}

/* ══ SCROLL REVEAL ══ */
.sr{opacity:0;transform:translateY(22px);transition:opacity .62s cubic-bezier(.16,1,.3,1),transform .62s cubic-bezier(.16,1,.3,1);transition-delay:var(--d,0s)}
.sr.on{opacity:1;transform:none}
.sr-d1{--d:.06s}.sr-d2{--d:.13s}.sr-d3{--d:.21s}.sr-d4{--d:.29s}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes dwDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}

/* ══ UNIVERSITY TICKER ══ */
.uni-ticker-wrap{background:#0a5c44;overflow:hidden;position:relative;padding:0}
.uni-ticker-inner{position:relative;padding:16px 0 14px}
.uni-ticker-label{text-align:center;font-size:8.5px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:rgba(255,255,255,.30);margin-bottom:14px;font-family:"DM Sans",sans-serif}
.uni-ticker-fade{position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none}
.uni-ticker-fade-l{left:0;background:linear-gradient(to right,#0a5c44,transparent)}
.uni-ticker-fade-r{right:0;background:linear-gradient(to left,#0a5c44,transparent)}
.uni-ticker-track{display:flex;align-items:center;gap:10px;width:max-content;animation:uniScroll 38s linear infinite}
.uni-ticker-track:hover{animation-play-state:paused}
@keyframes uniScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.uni-pill{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 18px;display:flex;align-items:center;justify-content:center;height:46px;min-width:80px;flex-shrink:0;transition:all .2s}
.uni-pill:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.28)}
.uni-pill-text{font-family:"DM Serif Display",serif;font-size:14px;color:rgba(255,255,255,.55);letter-spacing:-.01em;font-style:italic;padding:8px 20px}
.uni-pill-text:hover{color:rgba(255,255,255,.80)}

/* ══ STATS STRIP ══ */
.stats{background:var(--cr);padding:3.25rem 2rem;border-bottom:1px solid var(--sil)}
.stats-inner{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:2rem;text-align:center}
@media(max-width:720px){.stats-inner{grid-template-columns:repeat(2,1fr)}}
.stat-n{font-family:"DM Serif Display",serif;font-size:3rem;font-weight:400;color:var(--esp);letter-spacing:-.05em;line-height:1}
.stat-n em{font-style:italic;color:var(--med)}
.stat-l{font-size:11px;font-weight:700;color:rgba(15,26,20,.38);margin-top:5px;letter-spacing:.07em;text-transform:uppercase}

/* ══ PRODUCT DEMO ══ */
.demo-section{background:#fff;padding:6rem 0 5rem;position:relative}
.demo-section::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sil) 30%,var(--sil) 70%,transparent)}
.demo-inner{max-width:580px;margin:0 auto;padding:0 32px;text-align:center;margin-bottom:3.25rem}
.demo-eyebrow{display:inline-flex;align-items:center;gap:6px;border:1px solid rgba(10,92,68,.15);border-radius:99px;padding:5px 14px;font-size:9px;font-weight:700;color:var(--med);letter-spacing:.10em;text-transform:uppercase;background:var(--surf);margin-bottom:1rem;box-shadow:0 1px 3px rgba(15,26,20,.04)}
.demo-eyebrow-dot{width:5px;height:5px;border-radius:50%;background:#34C759;animation:livepulse 2.5s ease-in-out infinite}
.demo-h{font-family:"DM Serif Display",serif;font-size:clamp(2rem,3.8vw,2.85rem);font-weight:400;color:var(--esp);letter-spacing:-.045em;line-height:1.05;margin-bottom:.7rem}
.demo-h em{font-style:italic;color:var(--med)}
.demo-sub{font-size:14.5px;color:rgba(15,26,20,.44);line-height:1.78;max-width:420px;margin:0 auto}
.demo-wrap{max-width:980px;margin:0 auto;padding:0 32px}

/* Window */
.demo-window{border-radius:20px;overflow:hidden;max-width:900px;margin:0 auto;opacity:0;transform:translateY(24px);transition:opacity .72s cubic-bezier(.16,1,.3,1),transform .72s cubic-bezier(.16,1,.3,1);box-shadow:0 0 0 1px rgba(15,26,20,.07),0 24px 72px rgba(15,26,20,.14),0 8px 24px rgba(15,26,20,.06)}
.demo-window.visible{opacity:1;transform:none}
.dw-chrome{display:flex;align-items:center;gap:10px;padding:11px 16px;background:#f4f6f4;border-bottom:1px solid rgba(15,26,20,.07)}
.dw-dots{display:flex;gap:5px}
.dw-dot{width:9px;height:9px;border-radius:50%}
.dw-dot-r{background:#EE6B5E}.dw-dot-y{background:#F5C843}.dw-dot-g{background:#58C142}
.dw-url{flex:1;background:rgba(15,26,20,.05);border-radius:6px;padding:4px 12px;font-size:10px;color:rgba(15,26,20,.30);text-align:center;font-family:monospace;max-width:220px;margin:0 auto}
.dw-chrome-right{font-size:9px;font-weight:600;color:rgba(15,26,20,.25);letter-spacing:.02em;font-family:"DM Sans",sans-serif}

/* 3-col grid */
.dw-body{display:grid;grid-template-columns:148px 1fr 228px;height:432px;overflow:hidden}
@media(max-width:720px){.dw-body{grid-template-columns:1fr;height:300px}}

/* Left sidebar */
.dw-sidebar{border-right:1px solid rgba(15,26,20,.07);padding:14px 10px;background:#f4f6f4;display:flex;flex-direction:column;gap:2px}
@media(max-width:720px){.dw-sidebar{display:none}}
.dw-sb-label{font-size:7.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(15,26,20,.24);margin:5px 0 5px 8px;font-family:"DM Sans",sans-serif}
.dw-sb-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;font-size:11px;font-weight:500;color:rgba(15,26,20,.46);cursor:default;transition:all .15s;font-family:"DM Sans",sans-serif}
.dw-sb-item.dw-active{background:var(--esp);color:var(--ln);box-shadow:0 1px 4px rgba(15,26,20,.18)}
.dw-sb-icon{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0}
.dw-active .dw-sb-icon{background:rgba(245,237,224,.14);color:var(--ln)}
.dw-sb-item:not(.dw-active) .dw-sb-icon{background:rgba(15,26,20,.08);color:rgba(15,26,20,.40)}
.dw-sb-divider{height:1px;background:rgba(15,26,20,.06);margin:6px 0}
.dw-progress{padding:2px 6px}
.dw-prog-label{display:flex;justify-content:space-between;font-size:9px;color:rgba(15,26,20,.28);margin-bottom:3px;font-family:"DM Sans",sans-serif}
.dw-prog-track{height:2px;background:rgba(15,26,20,.07);border-radius:2px;overflow:hidden;margin-bottom:8px}
.dw-prog-fill{height:100%;background:linear-gradient(90deg,var(--esp),var(--med));border-radius:2px;width:0;transition:width 1.5s cubic-bezier(.16,1,.3,1) .4s}
.dw-prog-fill.anim{width:var(--tw,60%)}

/* Middle chat */
.dw-main{display:flex!important;flex-direction:column!important;overflow:hidden!important;background:#fff;flex:1;border-right:1px solid rgba(15,26,20,.06)}
.dw-question-header{padding:11px 14px;border-bottom:1px solid rgba(15,26,20,.06);flex-shrink:0}
.dw-q-company{display:inline-flex;align-items:center;gap:4px;background:var(--ln);border:1px solid rgba(15,26,20,.08);padding:2px 9px;border-radius:99px;font-size:10px;font-weight:700;color:var(--esp);font-family:"DM Sans",sans-serif}
.dw-q-company-dot{width:10px;height:10px;border-radius:3px;background:var(--esp);display:flex;align-items:center;justify-content:center;font-size:5.5px;color:var(--ln);font-weight:800}
.dw-round-pill{background:rgba(15,26,20,.06);color:var(--med);padding:2px 8px;border-radius:99px;font-size:9px;font-weight:600;font-family:"DM Sans",sans-serif}
.dw-timer{display:flex;align-items:center;gap:5px;font-size:14px;font-weight:700;font-family:"DM Serif Display",serif;color:var(--esp);letter-spacing:-.04em}
.dw-timer-live{width:6px;height:6px;border-radius:50%;background:#34C759;animation:livepulse 2.5s ease-in-out infinite}
.dw-chat-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.dw-messages{flex:1;overflow-y:auto;padding:12px 14px 8px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;scrollbar-width:none}
.dw-messages::-webkit-scrollbar{display:none}
.dw-bubble{display:flex;flex-direction:column;max-width:86%;opacity:0;transform:translateY(8px);transition:opacity .28s ease,transform .28s cubic-bezier(.16,1,.3,1)}
.dw-bubble.visible{opacity:1;transform:none}
.dw-bubble-ai{align-self:flex-start}
.dw-bubble-ai .dw-bubble-name{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--oat);margin-bottom:3px;padding-left:2px;font-family:"DM Sans",sans-serif}
.dw-bubble-ai .dw-bubble-text{background:#f4f6f4;border:1px solid rgba(15,26,20,.07);border-radius:4px 12px 12px 12px;padding:8px 11px;font-size:11.5px;line-height:1.58;color:var(--esp)}
.dw-bubble-user{align-self:flex-end}
.dw-bubble-user .dw-bubble-name{font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--oat);margin-bottom:3px;text-align:right;padding-right:2px;font-family:"DM Sans",sans-serif}
.dw-bubble-user .dw-bubble-text{background:var(--ln);border:1px solid rgba(15,26,20,.09);border-radius:12px 12px 4px 12px;padding:8px 11px;font-size:11.5px;line-height:1.58;color:var(--esp)}
.dw-typing-bubble{align-self:flex-start;opacity:0;transform:translateY(7px);transition:opacity .2s ease,transform .2s ease}
.dw-typing-bubble.visible{opacity:1;transform:none}
.dw-typing-bubble .dw-bubble-text{background:#f4f6f4;border:1px solid rgba(15,26,20,.07);border-radius:4px 12px 12px 12px;padding:9px 12px;display:flex;align-items:center;gap:4px}
.dw-t-dot{width:4px;height:4px;border-radius:50%;background:rgba(15,26,20,.22);animation:dwDot 1.2s ease-in-out infinite}
.dw-t-dot:nth-child(2){animation-delay:.18s}.dw-t-dot:nth-child(3){animation-delay:.36s}
.dw-input-bar{display:flex;align-items:center;gap:8px;border-top:1px solid rgba(15,26,20,.06);padding:9px 13px;background:#fff;flex-shrink:0}
.dw-input-text{font-size:11px;color:rgba(15,26,20,.22);flex:1;font-family:"DM Sans",sans-serif;transition:color .14s}
.dw-input-text.active{color:var(--esp)}
.dw-input-send{width:27px;height:27px;border-radius:50%;background:var(--esp);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s,opacity .15s}
.dw-input-send:hover{transform:scale(1.08)}
@keyframes dwSendFlash{0%{transform:scale(1)}50%{transform:scale(1.25);background:var(--med)}100%{transform:scale(1)}}
.dw-input-send.flash{animation:dwSendFlash .32s cubic-bezier(.34,1.56,.64,1)}

/* Right feedback panel */
.dw-feedback{background:#081910;padding:15px 13px;overflow-y:auto;opacity:0;transform:translateX(8px);transition:opacity .46s ease .15s,transform .46s cubic-bezier(.16,1,.3,1) .15s;display:flex;flex-direction:column}
.dw-feedback.revealed{opacity:1!important;transform:none!important}
@media(max-width:720px){.dw-feedback{display:none}}

/* Score ring */
.dw-score-ring-wrap{display:flex;justify-content:center;margin-bottom:12px}
.dw-score-ring{position:relative;width:66px;height:66px}
.dw-score-ring svg{width:66px;height:66px;transform:rotate(-90deg)}
.dw-ring-track{fill:none;stroke:rgba(245,237,224,.10);stroke-width:5}
.dw-ring-fill{fill:none;stroke:#0a5c44;stroke-width:5;stroke-dasharray:195;stroke-dashoffset:195;transition:stroke-dashoffset 1.4s cubic-bezier(.16,1,.3,1) .5s;stroke-linecap:round}
.dw-score-ring.anim .dw-ring-fill{stroke-dashoffset:30}
.dw-score-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.dw-score-num{font-family:"DM Serif Display",serif;font-size:18px;color:#a8d8c8;letter-spacing:-.04em;line-height:1}
.dw-score-unit{font-size:7px;font-weight:700;color:rgba(245,237,224,.28);letter-spacing:.06em;text-transform:uppercase;font-family:"DM Sans",sans-serif}

/* Score bars (new) */
.dw-score-bars{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.dw-score-bar-row{display:flex;align-items:center;gap:6px}
.dw-score-bar-lbl{font-size:8px;font-weight:600;color:rgba(245,237,224,.28);width:44px;flex-shrink:0;font-family:"DM Sans",sans-serif}
.dw-score-bar-track{flex:1;height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.dw-score-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#0a5c44,#4dc994);width:0;transition:width 1.1s cubic-bezier(.16,1,.3,1) .9s}
.dw-feedback.revealed .dw-score-bar-fill{width:var(--bw,80%)}
.dw-score-bar-val{font-size:9px;font-weight:700;color:#4dc994;min-width:22px;text-align:right;font-family:"DM Sans",sans-serif}

/* Tags */
.dw-fb-section{margin-bottom:8px}
.dw-fb-section-title{font-size:7.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(77,201,148,.38);margin-bottom:5px;font-family:"DM Sans",sans-serif}
.dw-tag{display:inline-flex;font-size:9px;font-weight:600;padding:2px 8px;border-radius:99px;margin:1.5px;font-family:"DM Sans",sans-serif}
.dw-tag-good{background:rgba(52,199,89,.11);color:#34C759}
.dw-tag-imp{background:rgba(77,201,148,.09);color:#4dc994}
.dw-fb-tip{font-size:10px;line-height:1.62;color:rgba(224,235,230,.55);background:rgba(10,92,68,.07);border-radius:8px;padding:8px 10px;margin:8px 0 10px;border:1px solid rgba(10,92,68,.13);font-family:"DM Sans",sans-serif}
.dw-fb-tip strong{color:rgba(245,237,224,.72)}
.dw-next-btn{display:flex;align-items:center;justify-content:center;gap:5px;font-size:10.5px;font-weight:700;color:#081910;background:linear-gradient(135deg,#b8ddd4,#7effc0);border:none;border-radius:99px;padding:8px 13px;cursor:pointer;font-family:"DM Sans",sans-serif;width:100%;transition:opacity .14s;letter-spacing:-.01em;margin-bottom:10px}
.dw-next-btn:hover{opacity:.88}

/* Bean — ONLY at the bottom, once */
.dw-bean-bottom{margin-top:auto;padding-top:10px;border-top:1px solid rgba(245,237,224,.07);display:flex;align-items:center;gap:8px}
.dw-bean-img{width:26px;height:26px;object-fit:contain;flex-shrink:0;cursor:pointer;transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.dw-bean-img:hover{transform:scale(1.15) rotate(-5deg)}
.dw-bean-name{font-size:10px;font-weight:700;color:rgba(245,237,224,.60);font-family:"DM Serif Display",serif}
.dw-bean-label{font-size:8.5px;color:rgba(245,237,224,.28);font-family:"DM Sans",sans-serif;margin-top:1px}

/* ══ UNIVERSITIES ══ */
.unis-section{background:#f0f7f4;padding:5rem 0 5.5rem;position:relative;overflow:hidden}
.unis-section::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 55% 60% at 85% 30%,rgba(255,255,255,.55) 0%,transparent 60%);pointer-events:none}
.unis-inner{max-width:1060px;margin:0 auto;padding:0 32px;position:relative;z-index:1}
.unis-state{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(15,26,20,.38);margin-bottom:1.5rem;display:flex;align-items:center;gap:10px}
.unis-state::before{content:"";display:block;width:28px;height:1px;background:rgba(15,26,20,.20)}
.unis-h{font-family:"DM Serif Display",serif;font-size:clamp(2rem,4vw,3rem);font-weight:400;color:var(--esp);letter-spacing:-.04em;line-height:1.05;margin-bottom:.9rem}
.unis-h em{font-style:italic;color:var(--med)}
.unis-sub{font-size:15px;color:rgba(15,26,20,.52);line-height:1.7;max-width:480px;margin-bottom:3rem}
.unis-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
@media(max-width:860px){.unis-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:560px){.unis-grid{grid-template-columns:repeat(2,1fr)}}
.uni-card{background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:1.1rem 1rem;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;min-height:72px;transition:all .18s;cursor:default}
.uni-card:hover{background:#fff;border-color:rgba(15,26,20,.14);transform:translateY(-2px);box-shadow:0 4px 16px rgba(15,26,20,.08)}
.uni-card-abbr{font-family:"DM Serif Display",serif;font-size:13px;font-weight:400;color:rgba(15,26,20,.30);letter-spacing:-.01em}
.uni-card-name{font-size:12px;font-weight:600;color:var(--esp);letter-spacing:-.01em;text-align:center;line-height:1.3}
.uni-card.featured .uni-card-name{color:var(--med)}
.unis-caption{font-size:12px;color:rgba(15,26,20,.38);text-align:center;font-style:italic}

/* ══ PROBLEM / SOLUTION ══ */
.ps-section{background:var(--cr);padding:5.5rem 0;position:relative}
.ps-section::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--sil) 30%,var(--sil) 70%,transparent)}
.ps-inner{max-width:1060px;margin:0 auto;padding:0 32px}
.ps-eyebrow{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(15,26,20,.35);margin-bottom:1.2rem}

<script>

function openModal(){document.getElementById('modal-overlay').style.display='flex'}
function closeModalDirect(){document.getElementById('modal-overlay').style.display='none'}
function switchTab(tab){

// ── BEAN SPEECH BUBBLE ──
var beanMessages = [
  "Hi! I'm Bean ☕ I review every answer at McKinsey standard.",
  "I'll tell you exactly why you're scoring 6s — and how to hit 9s.",
  "Click Start free — I'll have your first question ready in 30 seconds.",
  "74% of students come back every week. I wonder why 😏",
  "I've read every McKinsey PEI rubric. You haven't. Let's fix that.",
  "One question a day. I'll grade it like a Goldman partner would.",
];
var _beanMsgIdx = 0;
var _beanBubble = null;

function initBeans() {
  ['bean-container','bean-container-cta'].forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    var imgId = id === 'bean-container' ? 'bean-img' : 'bean-img-cta';
    var img = document.getElementById(imgId);
    if (!img) return;
    
    // Click: animate + show speech bubble
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      // Animate
      img.style.animation = 'none';
      void img.offsetWidth;
      var anims = ['beanJump 0.65s cubic-bezier(.34,1.56,.64,1)','beanWiggle 0.45s ease','beanSpin 0.55s cubic-bezier(.34,1.56,.64,1)'];
      img.style.animation = anims[_beanMsgIdx % anims.length];
      setTimeout(function() { img.style.animation = 'beanFloat 3.5s ease-in-out infinite'; }, 900);
      
      // Show speech bubble
      showBeanBubble(el, beanMessages[_beanMsgIdx % beanMessages.length]);
      _beanMsgIdx++;
    });
  });
}

function showBeanBubble(container, msg) {
  // Remove existing
  var old = document.getElementById('bean-bubble');
  if (old) old.remove();
  
  var bubble = document.createElement('div');
  bubble.id = 'bean-bubble';
  bubble.style.cssText = 'position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#0f1a14;color:#f5ede0;font-family:"DM Sans",sans-serif;font-size:12px;line-height:1.5;padding:10px 14px;border-radius:12px 12px 12px 4px;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);z-index:100;pointer-events:none;animation:bubbleIn .3s cubic-bezier(.16,1,.3,1);max-width:220px;white-space:normal;text-align:left;';
  bubble.innerHTML = msg;
  
  // Arrow
  var arrow = document.createElement('div');
  arrow.style.cssText = 'position:absolute;bottom:-5px;left:18px;width:10px;height:10px;background:#0f1a14;clip-path:polygon(0 0,100% 0,0 100%);';
  bubble.appendChild(arrow);
  
  container.style.position = 'relative';
  container.appendChild(bubble);
  
  setTimeout(function() {
    if (bubble.parentNode) bubble.style.opacity = '0';
    setTimeout(function() { if (bubble.parentNode) bubble.remove(); }, 300);
  }, 3500);
}

// ── SCROLL REVEAL ──
function initSR() {
  var els = document.querySelectorAll('.sr');
  if (!window.IntersectionObserver) { els.forEach(function(e) { e.classList.add('on'); }); return; }
  var obs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('on'); obs.unobserve(e.target); } });
  }, {threshold: .12});
  els.forEach(function(e) { obs.observe(e); });
}

// ── DEMO ANIMATION ──
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
var _demoStarted=false,_demoTimer=null,_demoSteps=[],_demoIdx=0;
var DEMO_CONV=[
  {t:'wait',ms:500},
  {t:'bubble',side:'ai',name:'Mocha Coach',text:'Tell me about a time you used data to persuade someone to change course. How did you structure your argument?'},
  {t:'wait',ms:1400},
  {t:'typing',ms:1600},
  {t:'input',text:'During my junior year, I led the analytics workstream…',ms:80},
  {t:'bubble',side:'user',name:'You',text:'During my junior year, I led the analytics workstream for a go-to-market project. Our team was split on whether to enter a new segment — I built a revenue model show…'},
  {t:'send'},
  {t:'wait',ms:600},
  {t:'feedback'},
  {t:'wait',ms:5500},
  {t:'reset'}
];
function startDemoLoop(){if(_demoStarted)return;_demoStarted=true;_demoSteps=DEMO_CONV;_demoIdx=0;demoStep();startDemoTimer();}
function demoStep(){
  var msgsEl=document.getElementById('dw-messages');if(!msgsEl)return;
  if(_demoIdx>=_demoSteps.length){_demoIdx=0;demoStep();return;}
  var s=_demoSteps[_demoIdx];_demoIdx++;
  if(s.t==='wait'){_demoTimer=setTimeout(demoStep,s.ms);return;}
  if(s.t==='bubble'){
    var b=document.createElement('div');b.className='dw-bubble dw-bubble-'+s.side;
    b.innerHTML='<div class="dw-bubble-name">'+s.name+'</div><div class="dw-bubble-text">'+escHtml(s.text)+'</div>';
    msgsEl.appendChild(b);setTimeout(function(){b.classList.add('visible');},20);
    msgsEl.scrollTop=msgsEl.scrollHeight;_demoTimer=setTimeout(demoStep,120);return;
  }
  if(s.t==='typing'){
    var td=document.createElement('div');td.className='dw-typing-bubble';
    td.innerHTML='<div class="dw-bubble-text"><div class="dw-t-dot"></div><div class="dw-t-dot"></div><div class="dw-t-dot"></div></div>';
    msgsEl.appendChild(td);setTimeout(function(){td.classList.add('visible');},20);
    msgsEl.scrollTop=msgsEl.scrollHeight;
    _demoTimer=setTimeout(function(){if(td.parentNode)td.parentNode.removeChild(td);demoStep();},s.ms);return;
  }
  if(s.t==='input'){var el=document.getElementById('dw-input-text');if(el){el.textContent=s.text;el.classList.add('active');}_demoTimer=setTimeout(demoStep,s.ms);return;}
  if(s.t==='send'){
    var se=document.getElementById('dw-input-send');if(se){se.classList.add('flash');setTimeout(function(){se.classList.remove('flash');},400);}
    var ie=document.getElementById('dw-input-text');if(ie){ie.textContent='Type your answer…';ie.classList.remove('active');}
    _demoTimer=setTimeout(demoStep,300);return;
  }
  if(s.t==='feedback'){
    var fp=document.getElementById('dw-feedback-panel');if(fp)fp.classList.add('revealed');
    var rg=document.getElementById('demo-score-ring');if(rg)rg.classList.add('anim');
    var fills=document.querySelectorAll('.dw-prog-fill');for(var i=0;i<fills.length;i++)fills[i].classList.add('anim');
    _demoTimer=setTimeout(demoStep,200);return;
  }
  if(s.t==='reset'){
    var fp2=document.getElementById('dw-feedback-panel');if(fp2)fp2.classList.remove('revealed');
    var rg2=document.getElementById('demo-score-ring');if(rg2)rg2.classList.remove('anim');
    var me=document.getElementById('dw-messages');if(me)me.innerHTML='';
    _demoStarted=false;_demoIdx=0;_demoTimer=setTimeout(startDemoLoop,1200);return;
  }
  demoStep();
}
function startDemoTimer(){
  var secs=227;
  setInterval(function(){
    secs=Math.max(0,secs-1);
    var m=Math.floor(secs/60),s=secs%60;
    var el=document.getElementById('demo-timer');
    if(el)el.textContent=m+':'+(s<10?'0':'')+s;
    if(secs===0)secs=227;
  },1000);
}
function initDemoObserver(){
  var dw=document.getElementById('demo-window');if(!dw)return;
  if(!window.IntersectionObserver){startDemoLoop();return;}
  var obs=new IntersectionObserver(function(e){if(e[0].isIntersecting){startDemoLoop();dw.classList.add('visible');obs.unobserve(dw);}},{threshold:.25});
  obs.observe(dw);
}

// ── TRACKS ──
var TRACKS_DATA=[
  {id:'consulting',icon:'MC',name:'Management Consulting',firms:'McKinsey · BCG · Bain · Deloitte',q:'"Tell me about a time you influenced a stakeholder who had more information than you."',scores:[{label:'Structure',val:'9.1',w:91},{label:'Clarity',val:'8.4',w:84},{label:'Impact',val:'8.7',w:87}],style:'STAR with depth probe',focus:'Leadership & ownership',time:'90s',pressure:'HIGH'},
  {id:'banking',icon:'IB',name:'Investment Banking',firms:'Goldman · JPMorgan · Morgan Stanley',q:'"Walk me through a time you worked under extreme deadline pressure."',scores:[{label:'Structure',val:'8.8',w:88},{label:'Ownership',val:'9.1',w:91},{label:'Impact',val:'8.5',w:85}],style:'Situational + stakes',focus:'Performance under pressure',time:'90s',pressure:'HIGH'},
  {id:'tech',icon:'PM',name:'Tech & Product',firms:'Amazon · Google · Meta · Stripe',q:'"Describe a time you took ownership of a project outside your scope."',scores:[{label:'Ownership',val:'9.3',w:93},{label:'Structure',val:'8.0',w:80},{label:'Impact',val:'8.8',w:88}],style:'Behavioral + ownership',focus:'Scale & impact',time:'90-120s',pressure:'MEDIUM'},
  {id:'finance',icon:'PE',name:'Finance & PE',firms:'Blackstone · KKR · Citadel',q:'"Tell me about a time you identified a risk others missed."',scores:[{label:'Analysis',val:'9.0',w:90},{label:'Clarity',val:'8.2',w:82},{label:'Impact',val:'8.6',w:86}],style:'Analytical judgment',focus:'Risk & data reasoning',time:'90s',pressure:'HIGH'}
];
var _activeTrack=0,_trackTimer=null,_userOverride=false;
function renderTracks(){
  var listEl=document.getElementById('tracks-list'),prevEl=document.getElementById('track-preview');
  if(!listEl||!prevEl)return;
  var lh='';
  for(var i=0;i<TRACKS_DATA.length;i++){
    var tr=TRACKS_DATA[i],ac=i===0?' active':'';
    lh+='<div class="track-row'+ac+'" onclick="switchTrackUser('+i+')" style="--tr-d:'+(i*.07)+'s">';
    lh+='<div class="track-row-icon">'+tr.icon+'</div>';
    lh+='<div class="track-row-text"><div class="track-row-name">'+tr.name+'</div><div class="track-row-firms">'+tr.firms+'</div></div>';
    lh+='<div class="track-row-arrow">&#8250;</div></div>';
  }
  lh+='<div style="display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:11px;cursor:pointer;border:1px solid rgba(15,26,20,.09);background:rgba(15,26,20,.025);margin-top:3px" onclick="openModal()">';
  lh+='<div style="font-size:11px;color:rgba(15,26,20,.30)">&#x2795;</div><div style="flex:1;font-size:12px;font-weight:500;color:rgba(15,26,20,.38)">4 more: Healthcare, Nonprofit, Design, Marketing</div>';
  lh+='<div style="font-size:11px;color:rgba(15,26,20,.20)">&#8250;</div></div>';
  listEl.innerHTML=lh;
  var ph='';
  for(var j=0;j<TRACKS_DATA.length;j++){
    var tc=TRACKS_DATA[j],ac2=j===0?' active':'';
    var pc=tc.pressure==='HIGH'?'#e85d5d':'var(--oat)';
    ph+='<div class="track-card'+ac2+'">';
    ph+='<div class="tc-header"><div class="tc-badge"><div class="tc-badge-icon">'+tc.icon+'</div>'+tc.name+'</div>';
    ph+='<div style="display:flex;align-items:center;gap:5px;font-size:9px;font-weight:700;letter-spacing:.07em;color:'+pc+'"><div style="width:6px;height:6px;border-radius:50%;background:'+pc+'"></div>'+tc.pressure+' PRESSURE</div></div>';
    ph+='<div class="tc-q-meta"><span class="tc-q-tag">BEHAVIORAL</span><span class="tc-pace">PACE · '+tc.time+'</span></div>';
    ph+='<div class="tc-body"><div class="tc-q">'+tc.q+'</div><div class="tc-feedback">';
    for(var k=0;k<tc.scores.length;k++){var sc=tc.scores[k];ph+='<div class="tc-fb-row"><div class="tc-fb-label">'+sc.label+'</div><div class="tc-fb-bar"><div class="tc-fb-fill" style="--tw:'+sc.w+'%"></div></div><div class="tc-fb-val">'+sc.val+'</div></div>';}
    ph+='</div><button class="tc-try-btn" onclick="openModal()">Practice this track &#8594;</button></div></div>';
  }
  prevEl.innerHTML=ph;_activeTrack=0;
}
function switchTrack(idx){
  _activeTrack=idx;
  document.querySelectorAll('.track-row').forEach(function(r,i){r.classList.toggle('active',i===idx);});
  document.querySelectorAll('.track-card').forEach(function(c,j){c.classList.toggle('active',j===idx);});
}
function switchTrackUser(idx){_userOverride=true;if(_trackTimer)clearInterval(_trackTimer);switchTrack(idx);setTimeout(function(){_userOverride=false;startTrackAuto();},8000);}
function startTrackAuto(){_trackTimer=setInterval(function(){if(!_userOverride){_activeTrack=(_activeTrack+1)%TRACKS_DATA.length;switchTrack(_activeTrack);}},3200);}

// ── INIT ──
document.addEventListener('DOMContentLoaded',function(){
  initSR();
  initDemoObserver();
  renderTracks();
  startTrackAuto();
  initBeans();
});

var _bubbleStyle = document.createElement('style');
_bubbleStyle.textContent = '@keyframes bubbleIn{from{opacity:0;transform:translateX(-50%) translateY(6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
